<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>版本升级</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background-color: #f8f9fa;
            overflow: hidden;
        }

        .top-bar {
            background-color: #343a40;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-container {
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-top: 0;
            height: calc(100% - 60px);
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #555;
        }

        .input-group {
            width: min(500px, 100%);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0069d9;
            border-color: #0062cc;
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
            border-color: #545b62;
        }

        .btn-container {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .upgrade-status {
            margin-top: 18px;
            max-width: 700px;
            display: none;
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 16px;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(0, 162, 255, 0.18) 0%, rgba(0, 162, 255, 0) 34%),
                linear-gradient(180deg, #07111f 0%, #0a1628 56%, #09111d 100%) !important;
            color: #dbe8ff;
        }

        .top-bar {
            background: linear-gradient(90deg, rgba(5, 16, 29, 0.98), rgba(8, 26, 46, 0.95)) !important;
            border: 1px solid rgba(0, 162, 255, 0.22);
            border-radius: 8px;
            padding: 10px 16px;
            box-shadow: 0 12px 28px rgba(2, 8, 20, 0.32);
            min-height: 48px;
            flex-shrink: 0;
        }

        body .upgrade-container {
            flex: 1;
            min-height: 0;
            height: auto;
            overflow: auto;
            padding: 26px 28px;
            background: linear-gradient(180deg, rgba(10, 20, 34, 0.96), rgba(8, 15, 27, 0.94)) !important;
            border: 1px solid rgba(0, 162, 255, 0.16);
            border-radius: 12px;
            box-shadow: 0 18px 36px rgba(2, 8, 20, 0.34);
        }

        .upgrade-container::-webkit-scrollbar {
            width: 8px;
        }

        .upgrade-container::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.32);
            border-radius: 999px;
        }

        body label {
            color: #dbe8ff;
        }

        body .form-control {
            background: rgba(5, 10, 25, 0.82);
            border: 1px solid rgba(0, 162, 255, 0.35);
            color: #edf6ff;
            box-shadow: none;
        }

        body .form-control::placeholder {
            color: #7f9abf;
        }

        body .form-control:focus {
            background: rgba(8, 14, 30, 0.92);
            border-color: rgba(0, 212, 255, 0.46);
            color: #edf6ff;
            box-shadow: 0 0 0 0.18rem rgba(0, 162, 255, 0.18);
        }

        body .btn {
            border-radius: 7px;
            border: 1px solid rgba(0, 162, 255, 0.22);
            box-shadow: none;
        }

        body .btn-primary {
            background: linear-gradient(180deg, rgba(8, 31, 53, 0.96), rgba(8, 22, 37, 0.98)) !important;
            border-color: rgba(0, 212, 255, 0.28) !important;
            color: #eef9ff;
        }

        body .btn-primary:hover {
            background: linear-gradient(180deg, rgba(9, 37, 62, 0.98), rgba(10, 27, 44, 0.98)) !important;
            border-color: rgba(0, 212, 255, 0.4) !important;
        }

        body .btn-secondary {
            background: rgba(10, 20, 40, 0.82) !important;
            border-color: rgba(131, 160, 197, 0.22) !important;
            color: #d7e5fa;
        }

        body .btn-secondary:hover {
            background: rgba(16, 29, 52, 0.96) !important;
            border-color: rgba(131, 160, 197, 0.34) !important;
            color: #edf6ff;
        }

        .upgrade-status {
            background: rgba(10, 20, 34, 0.96);
            border-width: 1px;
        }

        .alert-success {
            color: #b7ffd8;
            border-color: rgba(72, 209, 146, 0.24);
        }

        .alert-danger {
            color: #ffc1c1;
            border-color: rgba(255, 108, 108, 0.28);
        }

        .alert-info {
            color: #dbefff;
            border-color: rgba(0, 212, 255, 0.24);
        }
    </style>
    <link rel="stylesheet" href="pcb-theme.css?v=20260323-black3">
</head>

<body>
    <div class="top-bar">
        <span>版本升级</span>
        <button class="btn btn-secondary" onclick="window.location.href='index1.html'">返回</button>
    </div>
    <div class="upgrade-container">
        <form id="upgradeForm">
            <div class="form-group">
                <label for="firmware-version">当前版本：</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="firmware-version" placeholder="读取中..." readonly>
                </div>
            </div>
            <div class="form-group">
                <label for="new-firmware-file">选择固件文件：</label>
                <div class="input-group">
                    <input type="file" class="form-control" id="new-firmware-file" required>
                </div>
            </div>
            <div class="form-group">
                <label for="firmware-target">更新地址（目标文件路径）：</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="firmware-target" value="/data/lintech/celectronicfence/server" placeholder="例如：/data/lintech/celectronicfence/server">
                </div>
            </div>
            <div class="btn-container">
                <button class="btn btn-primary" type="submit" id="startUpgradeBtn">开始升级</button>
            </div>
        </form>
        <div id="upgradeStatus" class="alert upgrade-status" role="alert"></div>
    </div>

    <script>
        async function parseResponseJson(response) {
            const text = await response.text();
            if (!text) {
                return {};
            }
            try {
                return JSON.parse(text);
            } catch (error) {
                return { message: text };
            }
        }

        function showUpgradeStatus(message, type) {
            const statusEl = document.getElementById('upgradeStatus');
            statusEl.className = 'alert upgrade-status';
            if (type === 'success') {
                statusEl.classList.add('alert-success');
            } else if (type === 'error') {
                statusEl.classList.add('alert-danger');
            } else {
                statusEl.classList.add('alert-info');
            }
            statusEl.textContent = message;
            statusEl.style.display = 'block';
        }

        async function loadCurrentVersion() {
            try {
                const response = await fetch('/api/device_info');
                const data = await parseResponseJson(response);
                const version = (data && data.softwareVersion) ? data.softwareVersion : '未知';
                document.getElementById('firmware-version').value = version;
            } catch (error) {
                document.getElementById('firmware-version').value = '读取失败';
            }
        }

        async function submitFirmwareUpgrade(event) {
            event.preventDefault();

            const fileInput = document.getElementById('new-firmware-file');
            const button = document.getElementById('startUpgradeBtn');
            const targetInput = document.getElementById('firmware-target');
            if (!fileInput.files || fileInput.files.length === 0) {
                showUpgradeStatus('请先选择固件文件。', 'error');
                return;
            }

            const targetPath = targetInput.value.trim();
            if (!targetPath) {
                showUpgradeStatus('请先输入更新地址（目标文件路径）。', 'error');
                return;
            }

            const file = fileInput.files[0];
            if (!confirm('确定使用文件“' + file.name + '”更新固件吗？')) {
                return;
            }

            const formData = new FormData();
            formData.append('firmware', file);
            formData.append('targetPath', targetPath);

            try {
                button.disabled = true;
                button.textContent = '上传中...';
                showUpgradeStatus('正在上传并替换固件文件，请稍候...', 'info');

                const response = await fetch('/api/firmware/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await parseResponseJson(response);

                if (!response.ok || data.status !== 'success') {
                    throw new Error(data.message || '固件升级失败');
                }

                showUpgradeStatus('固件更新成功，文件已替换到：' + (data.targetPath || targetPath) + '。请重启设备使更新生效。', 'success');
            } catch (error) {
                showUpgradeStatus('固件更新失败：' + error.message, 'error');
            } finally {
                button.disabled = false;
                button.textContent = '开始升级';
            }
        }

        document.getElementById('upgradeForm').addEventListener('submit', submitFirmwareUpgrade);
        loadCurrentVersion();
    </script>
</body>

</html>
