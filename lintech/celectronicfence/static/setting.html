<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网络配置页面</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background-color: #f8f9fa;
            overflow: hidden;
        }

        /* 顶部栏样式 */
       .top-bar {
            background-color: #343a40;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

       .setting-container {
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-top: 0px;
            height: calc(100% - 60px);
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 30px;
        }

       .form-group {
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #555;
        }

       .input-group {
            width: 300px;
        }

       .btn {
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

       .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

       .btn-primary:hover {
            background-color: #0069d9;
            border-color: #0062cc;
        }

       .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }

       .btn-secondary:hover {
            background-color: #5a6268;
            border-color: #545b62;
        }

       .btn-container {
            margin-top: 20px;
            display: flex;
        }

        /* 提示信息样式 */
       .alert-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 16px;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(0, 162, 255, 0.18) 0%, rgba(0, 162, 255, 0) 34%),
                linear-gradient(180deg, #07111f 0%, #0a1628 56%, #09111d 100%) !important;
            color: #dbe8ff;
        }

        .top-bar {
            background: linear-gradient(90deg, rgba(5, 16, 29, 0.98), rgba(8, 26, 46, 0.95)) !important;
            border: 1px solid rgba(0, 162, 255, 0.22);
            border-radius: 8px;
            padding: 10px 16px;
            box-shadow: 0 12px 28px rgba(2, 8, 20, 0.32);
            min-height: 48px;
            flex-shrink: 0;
        }

        body .setting-container {
            flex: 1;
            min-height: 0;
            height: auto;
            overflow: auto;
            padding: 26px 28px;
            background: linear-gradient(180deg, rgba(10, 20, 34, 0.96), rgba(8, 15, 27, 0.94)) !important;
            border: 1px solid rgba(0, 162, 255, 0.16);
            border-radius: 12px;
            box-shadow: 0 18px 36px rgba(2, 8, 20, 0.34);
        }

        .setting-container::-webkit-scrollbar {
            width: 8px;
        }

        .setting-container::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.32);
            border-radius: 999px;
        }

        body h1,
        body label {
            color: #dbe8ff;
        }

        body .form-control {
            background: rgba(5, 10, 25, 0.82);
            border: 1px solid rgba(0, 162, 255, 0.35);
            color: #edf6ff;
            box-shadow: none;
        }

        body .form-control::placeholder {
            color: #7f9abf;
        }

        body .form-control:focus {
            background: rgba(8, 14, 30, 0.92);
            border-color: rgba(0, 212, 255, 0.46);
            color: #edf6ff;
            box-shadow: 0 0 0 0.18rem rgba(0, 162, 255, 0.18);
        }

        body .btn {
            border-radius: 7px;
            border: 1px solid rgba(0, 162, 255, 0.22);
            box-shadow: none;
        }

        body .btn-primary {
            background: linear-gradient(180deg, rgba(8, 31, 53, 0.96), rgba(8, 22, 37, 0.98)) !important;
            border-color: rgba(0, 212, 255, 0.28) !important;
            color: #eef9ff;
        }

        body .btn-primary:hover {
            background: linear-gradient(180deg, rgba(9, 37, 62, 0.98), rgba(10, 27, 44, 0.98)) !important;
            border-color: rgba(0, 212, 255, 0.4) !important;
        }

        body .btn-secondary {
            background: rgba(10, 20, 40, 0.82) !important;
            border-color: rgba(131, 160, 197, 0.22) !important;
            color: #d7e5fa;
        }

        body .btn-secondary:hover {
            background: rgba(16, 29, 52, 0.96) !important;
            border-color: rgba(131, 160, 197, 0.34) !important;
            color: #edf6ff;
        }

        .alert-message {
            background: rgba(10, 20, 34, 0.96);
            border: 1px solid rgba(72, 209, 146, 0.24);
            color: #edf6ff;
            box-shadow: 0 18px 36px rgba(2, 8, 20, 0.4);
        }
    </style>
    <link rel="stylesheet" href="pcb-theme.css?v=20260323-black3">
</head>

<body>
    <div class="top-bar">
        <span>网络配置</span>
        <button class="btn btn-secondary" onclick="window.location.href='index1.html'">返回</button>
    </div>
    <div class="setting-container">
        <form>
            <div class="form-group">
                <label for="ipAddress">IP 地址：</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="ipAddress" placeholder="输入 IP 地址">
                </div>
            </div>
            <div class="form-group">
                <label for="subnetMask">子网掩码：</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="subnetMask" placeholder="输入子网掩码">
                </div>
            </div>
            <div class="form-group">
                <label for="gateway">网关：</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="gateway" placeholder="输入网关地址">
                </div>
            </div>
            <div class="form-group">
                <label for="dnsServers">DNS 服务器：</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="dnsServers" placeholder="输入 DNS 服务器地址">
                </div>
            </div>
            <div class="btn-container">
                <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
            </div>
        </form>
    </div>
    <div id="loadingMessage" class="alert-message" style="display:none;">正在保存配置，请稍候……</div>
    <div id="alertMessage" class="alert-message">配置已保存，正在重启网络服务，请稍候……</div>
    <script>
        async function saveSettings() {
            // 显示加载状态
            document.getElementById('loadingMessage').style.display = 'block';

            // 获取用户输入的值
            var ipAddress = document.getElementById('ipAddress').value;
            var subnetMask = document.getElementById('subnetMask').value;
            var gateway = document.getElementById('gateway').value;
            var dnsServers = document.getElementById('dnsServers').value.split(',');

            try {
                // 发送异步请求并等待响应
                const response = await fetch('/save_network_config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ipAddress: ipAddress,
                        subnetMask: subnetMask,
                        gateway: gateway,
                        dnsServers: dnsServers
                    })
                });

                const data = await response.text();
                if (data === 'Configuration saved successfully and applied to board.') {
                    document.getElementById('alertMessage').style.display = 'block';
                    // 设置定时器在 5 秒后隐藏提示信息
                    setTimeout(() => {
                        document.getElementById('alertMessage').style.display = 'none';
                    }, 5000);
                    // 隐藏加载状态
                    document.getElementById('loadingMessage').style.display = 'none';
                } else {
                    alert('保存配置时出现错误。');
                    // 隐藏加载状态
                    document.getElementById('loadingMessage').style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('发生错误，请检查控制台。');
                // 隐藏加载状态
                document.getElementById('loadingMessage').style.display = 'none';
            }
        }
    </script>
</body>

</html>
